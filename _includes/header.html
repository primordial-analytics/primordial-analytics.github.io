<!-- Header -->
<header class="position-relative vh-100 overflow-hidden">
    <div class="position-absolute top-0 start-0 w-100 h-100 bg-dark opacity-50 z-1"></div>
    <video playsinline="playsinline" autoplay="autoplay" muted="muted" loop="loop" class="position-absolute top-50 start-50 min-vw-100 min-vh-100 translate-middle object-fit-cover z-0">
        <source src="img/galaxy.mp4" type="video/mp4">
    </video>
    <div class="container h-100 position-relative z-2">
        <div class="d-flex align-items-center justify-content-center h-100 text-center">
            <div class="text-white">
                <h1 class="display-2 fw-bold mb-4 text-uppercase tracking-wide text-shadow">Create Something</h1>
                <h2 class="fs-3 fw-light text-white-50 mb-5 text-shadow">Non-Profit AI, Data Science, and Analytics</h2>
                <a href="#services" class="btn btn-primary btn-lg px-5 py-3 text-uppercase fw-bold rounded-pill shadow-lg mt-3 text-dark">Explore Our Work</a>
            </div>
        </div>
    </div>
</header>
