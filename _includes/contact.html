<!-- Contact -->
<section id="contact" class="py-5 bg-dark text-white position-relative" style="background-image: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=1920&q=80'); background-size: cover; background-position: center; background-attachment: fixed;">
    <div class="position-absolute top-0 start-0 w-100 h-100 bg-dark opacity-75"></div>
    <div class="container py-5 position-relative z-1">
        <div class="row mb-5 text-center">
            <div class="col-lg-8 offset-lg-2">
                <h2 class="display-5 fw-bold mb-3 text-white">Contact Us</h2>
                <p class="lead text-white-50 fs-4">Ready to start your next project?</p>
            </div>
        </div>
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="card border-0 shadow-lg rounded-4 bg-white p-4 p-md-5">
                    <form id="contactForm" name="sentMessage" novalidate="novalidate">
                        <div class="row g-4">
                            <div class="col-md-6">
                                <div class="form-group mb-4">
                                    <input class="form-control form-control-lg bg-light border-0 rounded-3 px-4 py-3" id="name" type="text" placeholder="Your Name *" required="required" data-validation-required-message="Please enter your name.">
                                    <p class="help-block text-danger small mt-1 mb-0"></p>
                                </div>
                                <div class="form-group mb-4">
                                    <input class="form-control form-control-lg bg-light border-0 rounded-3 px-4 py-3" id="email" type="email" placeholder="Your Email *" required="required" data-validation-required-message="Please enter your email address.">
                                    <p class="help-block text-danger small mt-1 mb-0"></p>
                                </div>
                                <div class="form-group mb-4 mb-md-0">
                                    <input class="form-control form-control-lg bg-light border-0 rounded-3 px-4 py-3" id="phone" type="tel" placeholder="Your Phone *" required="required" data-validation-required-message="Please enter your phone number.">
                                    <p class="help-block text-danger small mt-1 mb-0"></p>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group h-100">
                                    <textarea class="form-control form-control-lg bg-light border-0 rounded-3 px-4 py-3 h-100" id="message" placeholder="Tell us about your need or problem. *" required="required" data-validation-required-message="Please enter a message." style="min-height: 150px;"></textarea>
                                    <p class="help-block text-danger small mt-1 mb-0"></p>
                                </div>
                            </div>
                            <div class="col-12 text-center mt-5">
                                <div id="success"></div>
                                <button id="sendMessageButton" class="btn btn-primary btn-lg px-5 py-3 text-uppercase fw-bold rounded-pill shadow text-dark" type="submit">
                                    Send Message
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
