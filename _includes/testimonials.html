<!-- Testimonials -->
<section class="py-5" id="testimonials">
    <div class="container py-5">
        <div class="row mb-5 text-center">
            <div class="col-lg-8 offset-lg-2">
                <h2 class="display-5 fw-bold mb-3">Testimonials</h2>
                <p class="lead text-muted fs-4">A sampling of client comments...</p>
            </div>
        </div>
        <div class="row g-4 justify-content-center">
            {% for testimonial in site.testimonials %}
            <div class="col-md-6 col-lg-3">
                <div class="card h-100 border-0 shadow-sm rounded-4 bg-light p-4 text-center transition-hover">
                    <div class="mb-4 position-relative">
                        <img class="rounded-circle shadow-sm object-fit-cover" src="img/testimonials/{{ testimonial.pic }}" alt="{{ testimonial.name }}" style="width: 100px; height: 100px; border: 3px solid #fff;">
                    </div>
                    <blockquote class="blockquote mb-4">
                        <p class="text-muted fs-6 lh-lg fst-italic">"{{ testimonial.quote }}"</p>
                    </blockquote>
                    <div class="mt-auto">
                        <h5 class="fw-bold mb-1 fs-6">{{ testimonial.name }}</h5>
                        <p class="text-primary small fw-semibold mb-0">{{ testimonial.title }}</p>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
